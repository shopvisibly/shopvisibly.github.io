<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Visibly - Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #252422;
            color: #F8F8F8;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            font-size: 3rem;
            margin: 20px 0;
        }

        p {
            font-size: 1.2rem;
            margin: 20px 0;
        }

        .logo {
            width: 250px;
            height: auto;
        }

        .coming-soon {
            font-size: 1.5rem;
            margin: 30px 0;
        }

        .signup-form a {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #FF7043;
            color: #F8F8F8;
            border: none;
            text-decoration: none;
            border-radius: 5px;
            font-family: 'Montserrat', sans-serif;
            display: inline-block;
        }

        .social-links a {
            margin: 0 10px;
            color: #9B88FF;
            text-decoration: none;
            font-size: 1.2rem;
        }

        .social-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="White Logo.png" alt="Visibly Logo" class="logo">
        <h1>Elevate Your Content</h1>
        <p>Designed to enhance your creativity and elevate your content.</p>
        <p class="coming-soon">Launching Winter 2024</p>

        <div class="signup-form">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLScSJQZRjmQE_5zLtLroJ478Fw5dq2w26xRiTO0-kIUii9v28w/viewform?usp=sf_link" target="_blank">Sign Up for Early Access</a>
        </div>
    </div>
</body>
</html>
