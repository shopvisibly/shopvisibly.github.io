<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Visibly - Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #252422;
            color: #F8F8F8;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
        }

        .content {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            font-size: 3rem;
            margin: 20px 0;
        }

        p {
            font-size: 1.2rem;
            margin: 20px 0;
        }

        .logo {
            width: 250px;
            height: auto;
        }

        .coming-soon {
            font-size: 1.5rem;
            margin: 30px 0;
        }

        .signup-form a {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 900 !important; /* Stronger bold */
            background-color: #FF7043;
            color: #F8F8F8;
            border: none;
            text-decoration: none;
            border-radius: 5px;
            font-family: 'Montserrat', sans-serif;
            display: inline-block;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            p {
                font-size: 1.1rem;
            }

            .logo {
                width: 200px;
            }

            .coming-soon {
                font-size: 1.2rem;
            }

            .signup-form a {
                font-size: 0.9rem;
                padding: 8px 16px;
            }

            .content {
                padding: 20px 15px; /* Adds padding for tablets */
                margin: 0 15px; /* Adds margin to keep text away from edges */
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }

            .logo {
                width: 150px;
            }

            .coming-soon {
                font-size: 1rem;
            }

            .signup-form a {
                font-size: 0.9rem;
                font-weight: 900 !important; /* Extra emphasis on bold */
                padding: 7px 14px;
            }

            .content {
                padding: 20px 10px; /* Adjusts padding for mobile */
                margin: 0 10px; /* Adds margin for mobile to avoid edges */
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <!-- Explainer Video -->
        <div class="video-container" style="margin: 20px 0;">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/utavzSP33ec" 
            title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; 
            clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <img src="White Logo.png" alt="Visibly Logo" class="logo">
        <h1>Elevate Your Content</h1>
        <p>Designed to enhance your creativity and elevate your content.</p>
        <p class="coming-soon">Launching Spring 2025</p>

        <div class="signup-form">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLScSJQZRjmQE_5zLtLroJ478Fw5dq2w26xRiTO0-kIUii9v28w/viewform?usp=sf_link" target="_blank">Sign Up for Early Access</a>
        </div>
    </div>
</body>
</html>
